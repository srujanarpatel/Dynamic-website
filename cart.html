<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - MinimalShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="showHome()">MinimalShop</div>
            <div class="nav-links">
                <a href="#" onclick="showHome()">Home</a>
                <div class="cart-icon active" onclick="showCart()">
                    <span class="cart-count" id="cart-count">0</span>
                    🛒
                </div>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <div class="container">
            <div id="breadcrumb">Home > Cart</div>
        </div>
    </div>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="container">
            <div id="cart-container">
                <!-- Cart content will be dynamically loaded -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 MinimalShop. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Initialize cart page
        document.addEventListener('DOMContentLoaded', () => {
            UI.currentPage = 'cart';
            UI.renderCartPage();
            Cart.updateCartCount();
        });
    </script>
</body>
</html>
